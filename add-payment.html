<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VRK AGENCY | Add Payment</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>

    <style>
        .form-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .form-card {
            background: #ffffff;
            padding: 25px;
            width: 420px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        .search-results {
            margin-top: 5px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #ddd;
            max-height: 150px;
            overflow-y: auto;
        }

        .search-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .search-item:hover {
            background: #f3f3f3;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-group label {
            cursor: pointer;
        }

        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
            padding: 15px !important;
        }

        .form-group {
            margin-bottom: 10px !important;
        }

        .form-group input,
        .form-group select {
            padding: 8px 10px !important;
            font-size: 14px;
        }

        .modal-content h3 {
            margin-bottom: 10px;
        }

        .btn-primary {
            padding: 10px 18px;
        }

        .modal {
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="logo-area">
            <h2>VRK AGENCY</h2>
        </div>
        <nav class="nav-menu">
            <a onclick="goToPage('index.html')" class="nav-item">Dashboard</a>
            <a onclick="goToPage('payments.html')" class="nav-item active">Payments</a>
            <a onclick="goToPage('customers.html')" class="nav-item">Customers</a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="top-bar">
            <h1>Add Payment</h1>
            <button class="btn-primary" onclick="goToPage('payments.html')">← Back</button>
        </header>

        <div class="form-wrapper">
            <div class="form-card">

                <div class="form-header">
                    <h2>Add New Payment</h2>
                </div>

                <form id="paymentForm">

                    <div class="row">
                        <div class="col">
                            <div class="form-group">
                                <label>Customer *</label>
                                <input type="text" id="searchCustomer" placeholder="Search name or mobile">
                                <div id="results" class="search-results"></div>
                            </div>
                        </div>

                        <div class="col">
                            <div class="form-group">
                                <label>Date *</label>
                                <input type="date" id="date" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col">
                            <div class="form-group">
                                <label>Total Amount (₹) *</label>
                                <input type="number" id="total" required>
                            </div>
                        </div>

                        <div class="col">
                            <div class="form-group">
                                <label>Payment Type *</label>

                                <div class="radio-group">
                                    <label>
                                        <input type="radio" name="type" value="paid" checked> Paid
                                    </label>

                                    <label>
                                        <input type="radio" name="type" value="pending"> Pending
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group" id="receivedGroup" style="display:none;">
                        <label>Received Amount (₹)</label>
                        <input type="number" id="received">
                    </div>

                    <button type="submit" class="btn-primary">Save Payment</button>

                </form>

            </div>
        </div>

    </main>
</div>

<script>

function goToPage(p){ window.location.href = p; }

const db = window.firebaseDb;
const customersRef = db.ref('customers');
const paymentsRef = db.ref('payments');

let customers = [];
let selectedCustomer = null;

/* 🔒 Restrict future date in picker */
const dateInput = document.getElementById("date");
dateInput.max = new Date().toISOString().split("T")[0];

/* Load customers */
customersRef.once('value', snap => {
    customers = Object.entries(snap.val() || {}).map(([id, d]) => ({ id, ...d }));
});

/* Search */
document.getElementById('searchCustomer').oninput = function () {
    let val = this.value.toLowerCase();
    let html = "";

    customers
        .filter(c => c.name.toLowerCase().includes(val) || c.mobile.includes(val))
        .forEach(c => {
            html += `
            <div class="search-item" onclick="selectCustomer('${c.id}')">
                <strong>${c.name}</strong><br>
                <small>${c.mobile}</small>
            </div>`;
        });

    document.getElementById('results').innerHTML = html;
};

/* Select */
function selectCustomer(id){
    selectedCustomer = customers.find(c => c.id === id);
    document.getElementById('searchCustomer').value = selectedCustomer.name;
    document.getElementById('results').innerHTML = "";
}

/* Radio toggle */
document.querySelectorAll('input[name="type"]').forEach(radio => {
    radio.addEventListener('change', function () {
        document.getElementById('receivedGroup').style.display =
            this.value === 'pending' ? 'block' : 'none';
    });
});

/* ✅ SINGLE SUBMIT HANDLER */
document.getElementById('paymentForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const dateValue = dateInput.value;
    const selectedDate = new Date(dateValue);
    const today = new Date();

    today.setHours(0,0,0,0);
    selectedDate.setHours(0,0,0,0);

    if(selectedDate > today){
        alert("Future date not allowed");
        return;
    }

    if (!selectedCustomer) {
        alert("Select customer");
        return;
    }

    let total = Number(document.getElementById('total').value);
    let type = document.querySelector('input[name="type"]:checked').value;

    let received = type === 'paid'
        ? total
        : Number(document.getElementById('received').value);

    let data = {
        customerId: selectedCustomer.id,
        totalAmount: total,
        receivedAmount: received,
        pendingAmount: total - received,
        date: selectedDate.getTime()
    };

    paymentsRef.push(data).then(() => {
        alert("Payment Saved");
        window.location.href = "payments.html";
    });

});

</script>

</body>
</html>
