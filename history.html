<!DOCTYPE html>
<html>

<head>
    <title>History</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>
</head>

<body>

    <div class="main-content">
        <h2>Customer History</h2>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Received</th>
                    <th>Pending</th>
                </tr>
            </thead>

            <tbody id="body"></tbody>
        </table>

    </div>

    <script>
        const db = window.firebaseDb;
        const paymentsRef = db.ref('payments');

        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('customerId');

        function formatINR(x) { return "₹" + Number(x).toLocaleString('en-IN'); }

        paymentsRef.on('value', snap => {
            let obj = snap.val() || {};
            let payments = Object.entries(obj).map(([id, d]) => ({ id, ...d }));

            let html = "";

            payments
                .filter(p => p.customerId === customerId)
                .forEach(p => {
                    html += `
      <tr>
        <td>${new Date(p.date).toLocaleDateString()}</td>
        <td>${formatINR(p.totalAmount)}</td>
        <td>${formatINR(p.receivedAmount)}</td>
        <td>${formatINR(p.pendingAmount)}</td>
      </tr>`;
                });

            document.getElementById('body').innerHTML = html;
        });
    </script>

</body>

</html>
