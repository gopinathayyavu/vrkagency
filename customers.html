<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRK AGENCY | Customers</title>
  <link rel="stylesheet" href="css/style.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="js/firebase.js"></script>

  <style>
    .btn-delete {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-edit {
      background: #007bff;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .btn-delete:hover {
      background: #b02a37;
    }

    .btn-edit:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo-area">
        <h2>VRK AGENCY</h2>
      </div>
      <nav class="nav-menu">
        <a onclick="goToPage('index.html')" class="nav-item">Dashboard</a>
        <a onclick="goToPage('payments.html')" class="nav-item">Payments</a>
        <a onclick="goToPage('customers.html')" class="nav-item active">Customers</a>
        <a onclick="goToPage('products.html')" class="nav-item">Products</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1>Customers</h1>
        <!-- Add Customer button removed as requested -->
      </header>

      <div class="table-container">
        <div class="responsive-table">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Place</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="customersTableBody">
              <tr>
                <td colspan="4">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Modal for editing only (add functionality removed) -->
      <div id="editCustomerModal" class="modal">
        <div class="modal-content">
          <span class="close-modal" id="closeEditModal">&times;</span>
          <h3 id="modalTitle">Edit Customer</h3>

          <form id="editCustomerForm">
            <input type="hidden" id="editId">

            <div class="form-group">
              <label>Name *</label>
              <input type="text" autocomplete="off" id="custName" required>
            </div>

            <div class="form-group">
              <label>Mobile *</label>
              <input type="tel" autocomplete="off" id="custMobile" required>
            </div>

            <div class="form-group">
              <label>Place</label>
              <input type="text" autocomplete="off" id="custPlace">
            </div>

            <button type="submit" class="btn-primary">Update Customer</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    function goToPage(p) { window.location.href = p; }
  </script>

  <script>
    (function () {
      const db = window.firebaseDb;
      const customersRef = db.ref('customers');

      const tableBody = document.getElementById('customersTableBody');
      const editModal = document.getElementById('editCustomerModal');
      const closeBtn = document.getElementById('closeEditModal');
      const editForm = document.getElementById('editCustomerForm');

      const editIdInput = document.getElementById('editId');
      const modalTitle = document.getElementById('modalTitle');

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
      }

      /* DELETE customer */
      function deleteCustomer(id) {
        if (confirm("Delete this customer? This action cannot be undone.")) {
          customersRef.child(id).remove()
            .then(() => {
              // Optional: show toast or nothing
            })
            .catch(err => alert("Error deleting: " + err.message));
        }
      }

      /* EDIT: open modal with customer data */
      function editCustomer(id, name, mobile, place) {
        editModal.style.display = 'flex';
        modalTitle.innerText = "Edit Customer";
        editIdInput.value = id;
        document.getElementById('custName').value = name;
        document.getElementById('custMobile').value = mobile;
        document.getElementById('custPlace').value = place || '';
      }

      /* RENDER customers table with Edit & Delete buttons */
      function renderCustomers(snapshot) {
        const customers = snapshot.val() || {};
        const entries = Object.entries(customers);

        if (entries.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="4">No customers found</td></tr>';
          return;
        }

        let html = '';
        entries.forEach(([id, c]) => {
          html += `
            <tr>
              <td><strong>${escapeHtml(c.name)}</strong></td>
              <td>${escapeHtml(c.mobile)}</td>
              <td>${escapeHtml(c.place) || '—'}</td>
              <td>
                <button class="btn-edit" onclick="editCustomer('${id}','${escapeHtml(c.name)}','${escapeHtml(c.mobile)}','${escapeHtml(c.place || '')}')">Edit</button>
                <button class="btn-delete" onclick="deleteCustomer('${id}')">Delete</button>
              </td>
            </tr>
          `;
        });
        tableBody.innerHTML = html;
      }

      // Real-time listener
      customersRef.on('value', renderCustomers);

      /* MODAL close handlers */
      closeBtn.onclick = () => { editModal.style.display = 'none'; };
      window.onclick = e => { if (e.target === editModal) editModal.style.display = 'none'; };

      /* UPDATE customer (edit form submit) */
      editForm.addEventListener('submit', e => {
        e.preventDefault();
        const id = editIdInput.value;
        if (!id) return; // Should never happen since add is removed

        const name = document.getElementById('custName').value.trim();
        const mobile = document.getElementById('custMobile').value.trim();
        const place = document.getElementById('custPlace').value.trim();

        if (!name || !mobile) {
          alert("Name and Mobile are required");
          return;
        }

        customersRef.child(id).update({ name, mobile, place })
          .then(() => {
            editModal.style.display = 'none';
            editForm.reset();
          })
          .catch(err => alert("Update failed: " + err.message));
      });

      // Expose functions globally for onclick handlers
      window.deleteCustomer = deleteCustomer;
      window.editCustomer = editCustomer;

    })();
  </script>

  <!-- Basic modal styles (if not already in style.css) -->
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 20px;
      width: 400px;
      max-width: 90%;
      position: relative;
    }

    .close-modal {
      position: absolute;
      right: 20px;
      top: 15px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
    }

    .close-modal:hover {
      color: black;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn-primary {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 30px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #0b5ed7;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .table-container {
      overflow-x: auto;
    }

    .responsive-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .responsive-table th,
    .responsive-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    .responsive-table th {
      background: #f8fafc;
      font-weight: 600;
    }
  </style>
</body>

</html>
